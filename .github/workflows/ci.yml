name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check (db package)
        run: pnpm --filter @ascenta/db exec tsc --noEmit

      - name: Tests
        run: pnpm --filter @ascenta/platform exec vitest run --passWithNoTests
