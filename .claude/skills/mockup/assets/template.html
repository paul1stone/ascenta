<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascenta — {{MOCKUP_TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ================================================================
     ASCENTA DESIGN TOKENS
     Keep in sync with packages/ui/src/globals.css
     ================================================================ */
  :root {
    /* Brand */
    --deep-blue: #0c1e3d;
    --summit: #ff6b35;
    --summit-hover: #e85a2a;
    --glacier: #f8fafc;

    /* Section accent — set to the relevant section color */
    --accent: {{ACCENT_COLOR}};
    --accent-soft: color-mix(in srgb, var(--accent) 12%, transparent);
    --accent-mid: color-mix(in srgb, var(--accent) 25%, transparent);
    --accent-border: color-mix(in srgb, var(--accent) 20%, transparent);

    /* Neutrals */
    --text-primary: #0c1e3d;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --white: #ffffff;

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 6px 24px rgba(0,0,0,0.06);

    /* Sizing */
    --header-h: 56px;
    --sidebar-w: 220px;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--glacier);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ================================================================
     MOCKUP WRAPPER — presentation chrome (not part of the app)
     ================================================================ */
  .mockup-wrapper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .mockup-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .mockup-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--deep-blue);
    margin-bottom: 4px;
  }
  .mockup-subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* ================================================================
     BROWSER FRAME — fake browser chrome
     ================================================================ */
  .browser-frame {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.04);
    overflow: hidden;
  }
  .browser-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    background: var(--glacier);
    border-bottom: 1px solid var(--border);
  }
  .browser-dots { display: flex; gap: 6px; }
  .browser-dots span { width: 12px; height: 12px; border-radius: 50%; background: var(--border); }
  .browser-dots span:first-child { background: #feb2b2; }
  .browser-dots span:nth-child(2) { background: #fefcbf; }
  .browser-dots span:nth-child(3) { background: #c6f6d5; }
  .browser-url {
    flex: 1;
    margin-left: 12px;
    padding: 6px 14px;
    background: var(--white);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
    border: 1px solid var(--border-light);
  }

  /* ================================================================
     APP SHELL — matches real app layout
     ================================================================ */
  .app-layout { display: flex; height: 680px; }

  /* --- Sidebar (white bg, right border — matches nav-sidebar.tsx) --- */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--white);
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-logo {
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo-icon {
    width: 28px;
    height: 28px;
    background: var(--deep-blue);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-logo-icon svg { color: var(--white); }
  .sidebar-logo-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--deep-blue);
  }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: default;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    white-space: nowrap;
  }
  .sidebar-item.active {
    font-weight: 700;
    color: var(--text-primary);
  }
  .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-divider { margin: 4px 12px; border-bottom: 1px solid var(--border); }

  .sidebar-sub {
    display: block;
    padding: 6px 14px 6px 42px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: default;
    white-space: nowrap;
  }
  .sidebar-sub.active {
    font-weight: 600;
    color: var(--text-primary);
  }

  /* --- Top Header (matches top-header.tsx) --- */
  .top-header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    flex-shrink: 0;
  }
  .top-header-left { display: flex; align-items: center; gap: 10px; }
  .top-header-avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--deep-blue);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .top-header-company {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--deep-blue);
  }
  .top-header-right { display: flex; align-items: center; gap: 4px; }
  .header-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: none;
    background: none;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }
  .header-icon-btn svg { width: 16px; height: 16px; }

  /* --- Main Content Area --- */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--glacier);
  }
  .main-content {
    flex: 1;
    display: flex;
    min-width: 0;
    overflow: hidden;
  }

  /* ================================================================
     CHAT PANEL — matches do-tab-chat.tsx + chat-message.tsx
     ================================================================ */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }
  .chat-header-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--deep-blue);
  }

  .chat-messages {
    flex: 1;
    padding: 8px 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: var(--glacier);
  }

  /* Message bubble — matches ChatMessage component */
  .message { padding: 8px 16px; }
  .message-bubble {
    border-radius: 16px;
    border: 1px solid;
    padding: 16px;
    transition: all 0.15s;
  }
  .message.user .message-bubble {
    border-color: rgba(12, 30, 61, 0.15);
    background: rgba(12, 30, 61, 0.03);
  }
  .message.assistant .message-bubble {
    background: rgba(255, 255, 255, 0.8);
    border-color: var(--accent-border);
  }
  .message-inner { display: flex; gap: 12px; }
  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
  }
  .message.user .message-avatar { background: var(--deep-blue); }
  .message.assistant .message-avatar { background: var(--summit); }
  .message-avatar svg { width: 16px; height: 16px; }
  .message-content { flex: 1; min-width: 0; }
  .message-sender {
    font-size: 14px;
    font-weight: 600;
    color: var(--deep-blue);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .message-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-primary);
  }
  .message.user .message-text { color: rgba(12, 30, 61, 0.9); }
  .message-text strong { color: var(--accent); font-weight: 600; }

  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 500;
    color: var(--summit);
    background: rgba(255, 107, 53, 0.1);
    padding: 2px 8px;
    border-radius: 99px;
  }
  .tool-badge svg { width: 12px; height: 12px; }

  /* Chat input — matches real chat input */
  .chat-input-area { padding: 0 16px 16px; flex-shrink: 0; }
  .chat-input-box {
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--white);
    box-shadow: 0 8px 30px rgba(12, 30, 61, 0.05);
    overflow: hidden;
  }
  .chat-input-row { display: flex; align-items: flex-end; gap: 8px; padding: 8px; }
  .chat-input {
    flex: 1;
    border: none;
    font-size: 14px;
    color: var(--text-primary);
    background: transparent;
    font-family: inherit;
    padding: 8px 6px;
    min-height: 44px;
    resize: none;
    outline: none;
  }
  .chat-submit-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: none;
    background: var(--summit);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    flex-shrink: 0;
  }
  .chat-submit-btn svg { width: 18px; height: 18px; }

  /* ================================================================
     WORKING DOCUMENT PANEL — matches working-document.tsx
     ================================================================ */
  .working-doc-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 12px;
  }
  .working-doc-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    border: 1px solid;
    border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 8px 32px -4px color-mix(in srgb, var(--accent) 12%, transparent),
                0 0 0 1px color-mix(in srgb, var(--accent) 8%, transparent);
    overflow: hidden;
  }
  .working-doc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(
      135deg,
      color-mix(in srgb, var(--accent) 8%, white),
      color-mix(in srgb, var(--accent) 4%, white)
    );
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 15%, var(--border));
  }
  .working-doc-header-left { display: flex; align-items: center; gap: 8px; }
  .working-doc-header-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .working-doc-header-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--deep-blue);
  }
  .close-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.05);
    border: none;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    font-size: 16px;
  }
  .working-doc-body {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .working-doc-footer {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }

  /* ================================================================
     SHARED UI COMPONENTS
     ================================================================ */

  /* Buttons */
  .btn {
    padding: 10px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: default;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--white);
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .btn-summit { background: var(--summit); color: var(--white); }
  .btn-ghost { background: none; color: var(--text-secondary); }

  /* Offer / action buttons (in chat) */
  .offer-buttons { display: flex; gap: 8px; margin-top: 12px; }
  .offer-btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: default;
    border: none;
  }
  .offer-btn.primary {
    background: var(--accent);
    color: var(--white);
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .offer-btn.secondary {
    background: var(--glacier);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  /* Field prompt block (corrective actions) */
  .field-prompt {
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid rgba(226, 232, 240, 0.6);
    background: rgba(248, 250, 252, 0.3);
    padding: 16px;
  }
  .field-prompt-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 10px;
  }
  .field-prompt-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .field-pill {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--white);
    border: 1px solid var(--border);
    cursor: default;
  }

  /* ================================================================
     ANNOTATION CARDS — below browser frame for design notes
     ================================================================ */
  .annotation-bar {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .annotation-card {
    flex: 1;
    min-width: 200px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }
  .annotation-card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    font-size: 16px;
  }
  .annotation-card-icon.accent { background: var(--accent-soft); }
  .annotation-card-icon.blue { background: rgba(59, 130, 246, 0.1); }
  .annotation-card-icon.orange { background: rgba(255, 107, 53, 0.1); }
  .annotation-card h4 {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--deep-blue);
    margin-bottom: 4px;
  }
  .annotation-card p {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ================================================================
     ANIMATION
     ================================================================ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="mockup-wrapper">
  <div class="mockup-label">Ascenta {{SECTION}} — Feature Proposal</div>
  <div class="mockup-title">{{MOCKUP_TITLE}}</div>
  <div class="mockup-subtitle">
    {{MOCKUP_SUBTITLE}}
  </div>

  <!-- Browser Frame -->
  <div class="browser-frame">
    <div class="browser-bar">
      <div class="browser-dots"><span></span><span></span><span></span></div>
      <div class="browser-url">app.ascenta.ai / {{URL_PATH}}</div>
    </div>

    <div class="app-layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
          </div>
          <span class="sidebar-logo-text">ASCENTA</span>
        </div>
        <nav class="sidebar-nav">
          <!-- {{SIDEBAR_ITEMS}} -->
        </nav>
      </div>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Top Header -->
        <div class="top-header">
          <div class="top-header-left">
            <div class="top-header-avatar">SC</div>
            <span class="top-header-company">StoneCyber</span>
          </div>
          <div class="top-header-right">
            <button class="header-icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="header-icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </button>
            <button class="header-icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
            </button>
          </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
          <!-- {{MAIN_CONTENT}} -->
        </div>
      </div>
    </div>
  </div>

  <!-- Annotation Cards -->
  <div class="annotation-bar">
    <!-- {{ANNOTATIONS}} -->
  </div>
</div>

</body>
</html>
